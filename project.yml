name: EbookDigitizer
options:
  bundleIdPrefix: com.ebookdigitizer
  createIntermediateGroups: true
targets:
  EbookDigitizerCore:
    type: framework
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - EbookDigitizerCore/Sources
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        
  EbookDigitizer:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - EbookDigitizer/Sources
    dependencies:
      - target: EbookDigitizerCore
      - package: SwiftSoup
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: "EbookDigitizer/EbookDigitizer.entitlements"
        GENERATE_INFOPLIST_FILE: "YES"

packages:
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup.git
    from: 2.13.0
